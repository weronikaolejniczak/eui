name: Update Kibana dependencies

on:
  pull_request_target:
    types: [labeled]
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref to release
        type: string
        required: true
      pr_title:
        description: Kibana PR title
        default: Update EUI dependencies
        type: string
      pr_body:
        description: Kibana PR body
        default: This PR updates EUI dependencies in Kibana
        type: string
jobs:
  # Triggers the `release.yml` workflow to publish a snapshot.
  # We dispatch (instead of `workflow_call`) so `release.yml` stays the top-level
  # workflow of the publish run and the single npm trusted publishing entry point
  # shared with official releases. `release.yml` kicks off the rest of the
  # Kibana integration chain after publishing.
  trigger_release:
    name: Trigger snapshot release
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request_target' || github.event.label.name == 'ci:regression-integration-test-kibana' }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || inputs.release_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          INPUT_PR_TITLE: ${{ inputs.pr_title }}
          INPUT_PR_BODY: ${{ inputs.pr_body }}
        # language=bash
        run: |
          set -euo pipefail
          workflow_args=(
            "-f" "release_ref=$RELEASE_REF"
            "-f" "type=snapshot"
            "-f" "dry_run=false"
            "-f" "kibana_integration=true"
          )

          if [[ "$EVENT_NAME" == "pull_request_target" ]]; then
            # Triggered by label - use PR context
            workflow_args+=(
              "-f" "kibana_pr_title=[DO NOT MERGE] EUI Regression Integration Test - elastic/eui#$PR_NUMBER"
              "-f" "kibana_pr_body=This PR was created programmatically to run regression integration tests of EUI changes from $PR_URL"
              "-f" "kibana_source_pr_number=$PR_NUMBER"
            )
          else
            workflow_args+=(
              "-f" "kibana_pr_title=$INPUT_PR_TITLE"
              "-f" "kibana_pr_body=$INPUT_PR_BODY"
            )
          fi

          gh workflow run release.yml --repo "$GITHUB_REPOSITORY" "${workflow_args[@]}"
