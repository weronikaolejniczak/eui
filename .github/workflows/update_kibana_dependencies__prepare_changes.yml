################################################################################
# This workflow file is part of the chain of workflows focused on testing
# EUI changes in Kibana as part of our regression integration testing.
#
# This workflow is dispatched from `release.yml` after a snapshot is published
# and should not be run manually.
#
# Due to technical limitations and security rules, steps had to be divided
# into multiple subworkflows that must be triggered through
# `workflow_dispatch` and not the usual `workflow_call`.
################################################################################

name: 'Update Kibana dependencies - Prepare changes'

on:
  workflow_dispatch:
    inputs:
      dependencies:
        description: JSON-serialized map of dependencies to update
        type: string
        required: true
      pr_title:
        description: PR title
        required: true
        type: string
      pr_body:
        description: PR body
        type: string
      source_pr_number:
        description: Source PR number that triggered this workflow
        type: number
      nightly:
        description: Whether this is the scheduled nightly run
        type: boolean
        default: false
      eui_ref:
        description: EUI ref used to publish the snapshot
        type: string
        required: true
      eui_last_release:
        description: Latest stable EUI release reachable from the snapshot
        type: string
      eui_version:
        description: Published @elastic/eui snapshot version
        type: string
concurrency:
  group: ${{ inputs.nightly && 'kibana-nightly' || format('prepare-kibana-{0}', github.run_id) }}
  cancel-in-progress: false
  queue: max
permissions:
  id-token: write # Required for OIDC (Vault ephemeral token)
  contents: read
  actions: write # Required to dispatch the open-PR workflow

jobs:
  update:
    name: Prepare changes
    runs-on: ubuntu-latest
    steps:
      - name: Verify dependencies input
        env:
          DEPENDENCIES: ${{ inputs.dependencies }}
        # language=bash
        run: |
          if ! num_deps="$(jq 'map(select(has("name") and has("version"))) | length' <<< "$DEPENDENCIES")"; then
            echo "::error::Invalid dependencies input"
            exit 2
          elif [[ "$num_deps" -eq 0 ]]; then
            echo "::warning::No dependencies to update"
            exit 1
          else
            echo "$num_deps dependencies to update"
          fi
      - name: Checkout the upstream elastic/kibana repository
        uses: actions/checkout@v6
        with:
          repository: elastic/kibana
          fetch-depth: 1
          persist-credentials: false # We use different credentials for other git operations
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false # Don't cache anything as it's a different repository
      - name: Fetch ephemeral GitHub token
        id: fetch_ephemeral_token
        uses: elastic/ci-gh-actions/fetch-github-token@v1.5.3
        with:
          vault-instance: ci-prod
          vault-role: token-policy-4fabc48bd03f
      - name: Configure git
        env:
          GH_TOKEN: ${{ steps.fetch_ephemeral_token.outputs.token }}
        # language=bash
        run: |
          gh auth setup-git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add fork https://github.com/elastic/eui-kibana.git
      - name: Create new branch
        id: git_branch
        env:
          NIGHTLY: ${{ inputs.nightly }}
        # language=bash
        run: |
          # Nightly runs reuse a fixed branch; all other runs remain unique.
          if [[ "$NIGHTLY" == "true" ]]; then
            branch_name="nightly/update-dependencies"
          else
            branch_name="update-dependencies/$(date +%s)"
          fi
          git checkout -b "$branch_name"
          echo "BRANCH_NAME=$branch_name" >> "$GITHUB_OUTPUT"
          echo "::debug::Created branch '$branch_name'"
      - name: Update dependency versions
        env:
          DEPENDENCIES: ${{ inputs.dependencies }}
        # language=bash
        run: |
          jq -j '.[] | .name, "\u0000", .version, "\u0000"' <<< "$DEPENDENCIES" |
          xargs -0 -n 2 bash -c '
            pkg="$0"
            ver="$1"
            if [[ $(npm pkg get "devDependencies.$pkg") != "{}" ]]; then
              npm pkg set "devDependencies.$pkg=$ver"
            elif [[ $(npm pkg get "dependencies.$pkg") != "{}" ]]; then
              npm pkg set "dependencies.$pkg=$ver"
            else
              echo "::warning::Skipping $pkg: Not found in either dependencies or devDependencies";
            fi'
      - name: Run Kibana bootstrap script and normalize dependencies
        # language=bash
        run: |
          yarn kbn bootstrap
          node scripts/yarn_deduplicate
          yarn kbn bootstrap --force-install
      - name: Commit changed files
        # language=bash
        run: |
          git add package.json yarn.lock src/platform/packages/private/kbn-ui-shared-deps-npm/version_dependencies.txt
          git commit -m "chore: update dependencies"
      - name: Push branch to elastic/eui-kibana
        env:
          GH_TOKEN: ${{ steps.fetch_ephemeral_token.outputs.token }}
          BRANCH_NAME: ${{ steps.git_branch.outputs.BRANCH_NAME }}
          NIGHTLY: ${{ inputs.nightly }}
        # language=bash
        run: |
          if [[ "$NIGHTLY" == "true" ]]; then
            git push -u --force fork "$BRANCH_NAME"
          else
            git push -u fork "$BRANCH_NAME"
          fi
      - name: Trigger workflow to open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_BODY: ${{ inputs.pr_body }}
          BRANCH_NAME: ${{ steps.git_branch.outputs.BRANCH_NAME }}
          SOURCE_PR_NUMBER: ${{ inputs.source_pr_number }}
          NIGHTLY: ${{ inputs.nightly }}
          EUI_REF: ${{ inputs.eui_ref }}
          EUI_LAST_RELEASE: ${{ inputs.eui_last_release }}
          EUI_VERSION: ${{ inputs.eui_version }}
        # language=bash
        run: |
          set -euo pipefail
          # --repo is required because we're in the context of elastic/kibana right now
          args=(
            --repo elastic/eui
            -f "pr_title=$PR_TITLE"
            -f "pr_body=$PR_BODY"
            -f "pr_head=$BRANCH_NAME"
            -f "nightly=$NIGHTLY"
            -f "eui_ref=$EUI_REF"
            -f "eui_last_release=$EUI_LAST_RELEASE"
            -f "eui_version=$EUI_VERSION"
          )
          # An empty value is invalid for a number-typed workflow input.
          if [[ -n "${SOURCE_PR_NUMBER:-}" ]]; then
            args+=( -f "source_pr_number=$SOURCE_PR_NUMBER" )
          fi
          workflow_url=$(gh workflow run update_kibana_dependencies__open_pr.yml "${args[@]}")

          {
            echo "### Success :rocket:"
            echo ""
            echo "* Changes are prepared and pushed: https://github.com/elastic/eui-kibana/tree/$BRANCH_NAME"
            echo "* Pull request creation workflow triggered: $workflow_url"
          } >> "$GITHUB_STEP_SUMMARY"
